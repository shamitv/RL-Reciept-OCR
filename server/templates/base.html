<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="{{ request.app.url_path_for('static', path='eval.css') }}">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">RL Receipt OCR</p>
        <h1>{{ title }}</h1>
      </div>
      <nav class="hero-actions">
        <a href="/eval">Dashboard</a>
        <a href="/api/eval/summary">API Summary</a>
        <a href="/api/eval/report">Report</a>
      </nav>
    </header>
    {% if eval_models %}
    <section class="panel model-strip">
      <div>
        <p class="eyebrow">Extractor LLM</p>
        <strong>{{ eval_models.extractor_model }}</strong>
        <span class="meta mono">{{ eval_models.extractor_base_url }}</span>
      </div>
      <div>
        <p class="eyebrow">Judge LLM</p>
        <strong>{{ eval_models.judge_model }}</strong>
        <span class="meta mono">{{ eval_models.judge_base_url }}</span>
      </div>
    </section>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
