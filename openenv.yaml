name: rl-receipt-ocr
version: 0.1.0
description: Sequential receipt extraction environment for receipt headers, monetary summaries, reconciliation, and line-item extraction from annotated receipts.
entrypoint: env.server:app
runtime:
  python: "3.11"
tasks:
  - id: easy
    difficulty: easy
  - id: medium
    difficulty: medium
  - id: hard
    difficulty: hard
metadata:
  domain: document-extraction
  dataset: receipt-dataset-ds0
  baseline_agent: heuristic
  target_fields:
    - company
    - date
    - address
    - subtotal
    - tax
    - total
    - line_items
